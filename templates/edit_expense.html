{% extends "base.html" %}

{% block title %}Edit Expense — Spendly{% endblock %}

{% block content %}
<div class="profile-page">
    <h1 class="profile-page-title">Edit Expense</h1>

    <div class="profile-card form-card">
        <div class="profile-card-header">Edit Expense</div>
        <div class="form-card-body">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" name="amount" class="form-input"
                           step="0.01" min="0.01" placeholder="0.00"
                           value="{{ expense.amount }}" required autofocus>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled {% if not expense.category %}selected{% endif %}>Select a category</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}" {% if expense.category == cat %}selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" class="form-input"
                           value="{{ expense.date }}" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" class="form-input"
                           placeholder="Optional note" value="{{ expense.description }}">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-submit">Save Changes</button>
                    <a href="{{ url_for('profile') }}" class="btn-ghost">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
